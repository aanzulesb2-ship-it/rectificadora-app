<script>
function showInfo(name, role, bio, photo) {
    document.getElementById('info-name').innerText = name;
    document.getElementById('info-role').innerText = role;
    document.getElementById('info-bio').innerText = bio;
    document.getElementById('info-photo').src = photo;
    document.getElementById('person-info').style.display = 'block';
}

function closeInfo() {
    document.getElementById('person-info').style.display = 'none';
}
</script>
